name: Design defect 🎨
description: Report a visual design issue for an existing component or pattern.
title: '[Design Defect]: '
type: 'design-defect'
labels: ['🧩 design‑defect', 'status: needs-review', 'brightlayer-ui']
body:
    - type: markdown
      attributes:
          value: '## Welcome!'
    - type: markdown
      attributes:
          value: Thanks for taking the time to fill out the details below for this design
              defect.
    - type: dropdown
      id: package
      attributes:
          label: Package
          description: Which package(s) are you using?
          multiple: true
          options:
              - '@brightlayer-ui/react-native-components'
              - '@brightlayer-ui/react-native-themes'
              - '@brightlayer-ui/react-native-auth-workflow'
              - '@brightlayer-ui/react-native-progress-icons'
      validations:
          required: true
    - type: dropdown
      id: platform
      attributes:
          label: Platform
          description: Which platform(s) are you experiencing the issue?
          multiple: true
          options:
              - iOS
              - Android
    - type: input
      id: version
      attributes:
          label: Package version
          description: 'Which version(s) are you using?'
          placeholder: e.g. v10.42.0
      validations:
          required: true
    - type: textarea
      id: description
      attributes:
          label: Description
          description: "Tell us more about the problem that you're running into"
          placeholder: What did you see? What did you expect to see?
      validations:
          required: true
    - type: textarea
      id: example-url
      attributes:
          label: Screenshots
          description: 'Provide screenshots of the problem'
      validations:
          required: true
    - type: textarea
      id: reproduce
      attributes:
          label: Steps to reproduce
          description: 'How do we reproduce the problem displayed in the screenshots above?'
      validations:
          required: true


